global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: uptime-kuma
    scrape_interval: 30s
    metrics_path: /metrics
    basic_auth:
      password: ${KUMA_METRICS_API_KEY}
    static_configs:
      - targets: ["uptime-kuma:3001"]
