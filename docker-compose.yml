services:
  grafana:
    image: grafana/grafana:11.2.0
    container_name: bot-observability-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus

  loki:
    image: grafana/loki:3.1.0
    container_name: bot-observability-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.1.0
    container_name: bot-observability-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ${HALO_LOG_PATH}:/logs/halo:ro
      - ${PANDA_LOG_PATH}:/logs/panda:ro
    depends_on:
      - loki

  uptime-kuma:
    image: louislam/uptime-kuma:1.23.15
    container_name: bot-observability-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - kuma-data:/app/data

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bot-observability-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
      - ./secrets/kuma_metrics_api_key:/run/secrets/kuma_metrics_api_key:ro
    depends_on:
      - uptime-kuma

volumes:
  grafana-data:
    name: bot-observability-grafana-data
  loki-data:
    name: bot-observability-loki-data
  kuma-data:
    name: bot-observability-kuma-data
  prometheus-data:
    name: bot-observability-prometheus-data
