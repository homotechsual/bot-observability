server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: halo-bot
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2} '
          max_wait_time: 3s
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} [^\[]+) \[(?P<level>[A-Z]{3})\] (?P<source_context>[^ ]+) (?P<message>(?s:.*))$'
      - labels:
          level:
          source_context:
      - static_labels:
          component: other
      - match:
          selector: '{source_context=~".*[Yy]outube.*"}'
          stages:
            - static_labels:
                component: youtube
      - match:
          selector: '{source_context=~".*[Hh]alo[Ss]tatus.*"}'
          stages:
            - static_labels:
                component: halo_status
      - match:
          selector: '{source_context=~".*[Hh]eartbeat.*"}'
          stages:
            - static_labels:
                component: heartbeat
      - match:
          selector: '{source_context=~".*([Dd]iscord[Bb]ot[Ss]ervice|[Gg]ateway).*"}'
          stages:
            - static_labels:
                component: discord
    static_configs:
      - targets: [localhost]
        labels:
          job: halo-bot
          service: halo-bot
          __path__: /logs/halo/*.log

  - job_name: panda-bot
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2} '
          max_wait_time: 3s
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} [^\[]+) \[(?P<level>[A-Z]{3})\] (?P<source_context>[^ ]+) (?P<message>(?s:.*))$'
      - labels:
          level:
          source_context:
      - static_labels:
          component: other
      - match:
          selector: '{source_context=~".*[Ss]tar[Cc]itizen.*"}'
          stages:
            - static_labels:
                component: star_citizen
      - match:
          selector: '{source_context=~".*[Pp]ath[Oo]f[Ee]xile.*"}'
          stages:
            - static_labels:
                component: path_of_exile
      - match:
          selector: '{source_context=~".*([Rr]eturn[Oo]f[Rr]eckoning|[Rr][Oo][Rr][Mm]odule).*"}'
          stages:
            - static_labels:
                component: return_of_reckoning
      - match:
          selector: '{source_context=~".*([Aa]shes[Oo]f[Cc]reation|[Aa]shes[Ff]orge).*"}'
          stages:
            - static_labels:
                component: ashes_of_creation
      - match:
          selector: '{source_context=~".*([Dd]iscord[Bb]ot[Ss]ervice|[Ii]nteraction[Hh]andler|[Gg]ateway).*"}'
          stages:
            - static_labels:
                component: discord
      - match:
          selector: '{source_context=~".*[Hh]eartbeat.*"}'
          stages:
            - static_labels:
                component: heartbeat
    static_configs:
      - targets: [localhost]
        labels:
          job: panda-bot
          service: panda-bot
          __path__: /logs/panda/*.log

  - job_name: hudu-bot
    pipeline_stages:
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2} '
          max_wait_time: 3s
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} [^\[]+) \[(?P<level>[A-Z]{3})\] (?P<source_context>[^ ]+) (?P<message>(?s:.*))$'
      - labels:
          level:
          source_context:
      - static_labels:
          component: other
      - match:
          selector: '{source_context=~".*[Hh]udu[Rr]elease.*"}'
          stages:
            - static_labels:
                component: hudu_release
      - match:
          selector: '{source_context=~".*[Hh]alo[Ss]tatus.*"}'
          stages:
            - static_labels:
                component: halo_status
      - match:
          selector: '{source_context=~".*[Hh]eartbeat.*"}'
          stages:
            - static_labels:
                component: heartbeat
      - match:
          selector: '{source_context=~".*[Yy]outube.*"}'
          stages:
            - static_labels:
                component: youtube
      - match:
          selector: '{source_context=~".*([Dd]iscord[Bb]ot[Ss]ervice|[Gg]ateway).*"}'
          stages:
            - static_labels:
                component: discord
    static_configs:
      - targets: [localhost]
        labels:
          job: hudu-bot
          service: hudu-bot
          __path__: /logs/hudu/*.log
