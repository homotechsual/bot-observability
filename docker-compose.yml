services:
  grafana:
    image: grafana/grafana:13.0.1
    container_name: bot-observability-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=5m
      - GF_QUERY_CONCURRENT_QUERY_LIMIT=4
      - GOMEMLIMIT=350MiB
    cpus: 1.00
    mem_limit: 450m
    pids_limit: 64
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - prometheus

  loki:
    image: grafana/loki:3.7.2
    container_name: bot-observability-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    environment:
      - GOMEMLIMIT=300MiB
    mem_limit: 380m
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.6.11
    container_name: bot-observability-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    environment:
      - GOMEMLIMIT=200MiB
    mem_limit: 256m
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ${HALO_LOG_PATH}:/logs/halo:ro
      - ${PANDA_LOG_PATH}:/logs/panda:ro
      - ${HUDU_LOG_PATH}:/logs/hudu:ro
      - ${HOMOTECHSUAL_LOG_PATH}:/logs/homotechsual:ro
      - ${BRAN_LOG_PATH}:/logs/bran:ro
    depends_on:
      - loki

  uptime-kuma:
    image: louislam/uptime-kuma:2.3.2
    container_name: bot-observability-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_OPTIONS=--max-old-space-size=384
    mem_limit: 512m
    volumes:
      - kuma-data:/app/data

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: bot-observability-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=1GB"
    environment:
      - GOMEMLIMIT=300MiB
    mem_limit: 384m
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
      - ./secrets/kuma_metrics_api_key:/run/secrets/kuma_metrics_api_key:ro
    depends_on:
      - uptime-kuma
      - raw-feed-exporter
    extra_hosts:
      - "host.docker.internal:host-gateway"

  raw-feed-exporter:
    image: python:3.12-alpine
    container_name: bot-observability-raw-feed-exporter
    restart: unless-stopped
    command: ["python", "/app/raw-feed-exporter.py"]
    environment:
      - HALO_STATUS_FEED_URL=${HALO_STATUS_FEED_URL:-https://status.haloservicesolutions.com/pages/63ef45da7ee94905308a1a4a/rss}
      - HUDU_RELEASE_FEED_URL=${HUDU_RELEASE_FEED_URL:-https://hq.hudu.com/public/releases.json}
      - YOUTUBE_FEED_URLS=${YOUTUBE_FEED_URLS:-}
      - HALO_YOUTUBE_FEED_URLS_ENDPOINT=${HALO_YOUTUBE_FEED_URLS_ENDPOINT:-http://host.docker.internal:9191/observability/youtube-feed-urls}
      - HUDU_YOUTUBE_FEED_URLS_ENDPOINT=${HUDU_YOUTUBE_FEED_URLS_ENDPOINT:-http://host.docker.internal:9192/observability/youtube-feed-urls}
      - HOMOTECHSUAL_YOUTUBE_FEED_URLS_ENDPOINT=${HOMOTECHSUAL_YOUTUBE_FEED_URLS_ENDPOINT:-http://host.docker.internal:9194/observability/youtube-feed-urls}
      - RAW_FEED_EXPORTER_PORT=9115
      - RAW_FEED_TIMEOUT_SECONDS=20
      - RAW_FEED_CACHE_SECONDS=60
    mem_limit: 128m
    volumes:
      - ./deploy/raw-feed-exporter.py:/app/raw-feed-exporter.py:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  grafana-data:
    external: true
    name: bot-observability-grafana-data
  loki-data:
    external: true
    name: bot-observability-loki-data
  kuma-data:
    external: true
    name: bot-observability-kuma-data
  prometheus-data:
    external: true
    name: bot-observability-prometheus-data
