global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: uptime-kuma
    scrape_interval: 30s
    metrics_path: /metrics
    basic_auth:
      username: metrics
      password_file: /run/secrets/kuma_metrics_api_key
    static_configs:
      - targets: ["uptime-kuma:3001"]

  - job_name: raw-feed-exporter
    scrape_interval: 60s
    metrics_path: /metrics
    static_configs:
      - targets: ["raw-feed-exporter:9115"]
