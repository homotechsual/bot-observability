global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: uptime-kuma
    scrape_interval: 60s
    metrics_path: /metrics
    basic_auth:
      username: metrics
      password_file: /run/secrets/kuma_metrics_api_key
    static_configs:
      - targets: ["uptime-kuma:3001"]

  - job_name: raw-feed-exporter
    scrape_interval: 60s
    metrics_path: /metrics
    static_configs:
      - targets: ["bot-observability-raw-feed-exporter:9115"]

  - job_name: halo-bot
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: hudu-bot
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9092"]

  - job_name: panda-bot
    scrape_interval: 30s
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9093"]
