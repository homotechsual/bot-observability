server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: halo-bot
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} [^\[]+) \[(?P<level>[A-Z]{3})\] (?P<source_context>[^ ]+) (?P<message>.*)$'
      - labels:
          level:
          source_context:
      - static_labels:
          component: other
      - match:
          selector: '{source_context=~"(?i).*youtube.*"}'
          stages:
            - static_labels:
                component: youtube
      - match:
          selector: '{source_context=~"(?i).*halostatus.*"}'
          stages:
            - static_labels:
                component: halo_status
      - match:
          selector: '{source_context=~"(?i).*heartbeat.*"}'
          stages:
            - static_labels:
                component: heartbeat
      - match:
          selector: '{source_context=~"(?i).*(discordbotservice|gateway).*"}'
          stages:
            - static_labels:
                component: discord
    static_configs:
      - targets: [localhost]
        labels:
          job: halo-bot
          service: halo-bot
          __path__: /logs/halo/*.log

  - job_name: panda-bot
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} [^\[]+) \[(?P<level>[A-Z]{3})\] (?P<source_context>[^ ]+) (?P<message>.*)$'
      - labels:
          level:
          source_context:
      - static_labels:
          component: other
      - match:
          selector: '{source_context=~"(?i).*starcitizen.*"}'
          stages:
            - static_labels:
                component: star_citizen
      - match:
          selector: '{source_context=~"(?i).*pathofexile.*"}'
          stages:
            - static_labels:
                component: path_of_exile
      - match:
          selector: '{source_context=~"(?i).*(returnofreckoning|rormodule).*"}'
          stages:
            - static_labels:
                component: return_of_reckoning
      - match:
          selector: '{source_context=~"(?i).*(ashesofcreation|ashesforge).*"}'
          stages:
            - static_labels:
                component: ashes_of_creation
      - match:
          selector: '{source_context=~"(?i).*(discordbotservice|interactionhandler|gateway).*"}'
          stages:
            - static_labels:
                component: discord
      - match:
          selector: '{source_context=~"(?i).*heartbeat.*"}'
          stages:
            - static_labels:
                component: heartbeat
    static_configs:
      - targets: [localhost]
        labels:
          job: panda-bot
          service: panda-bot
          __path__: /logs/panda/*.log
