server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: halo-bot
    static_configs:
      - targets: [localhost]
        labels:
          job: halo-bot
          service: halo-bot
          __path__: /logs/halo/*.log

  - job_name: panda-bot
    static_configs:
      - targets: [localhost]
        labels:
          job: panda-bot
          service: panda-bot
          __path__: /logs/panda/*.log
