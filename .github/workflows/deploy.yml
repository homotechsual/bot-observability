name: Deploy Observability

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-observability
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate docker-compose syntax
        env:
          GRAFANA_ADMIN_USER: ci-admin
          GRAFANA_ADMIN_PASSWORD: ci-password
          HALO_LOG_PATH: /tmp/halo-logs
          PANDA_LOG_PATH: /tmp/panda-logs
        run: docker compose -f docker-compose.yml config >/dev/null

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create deployment bundle
        run: |
          git ls-files -z | grep -zv '^.github/' | tar --null -T - -czf observability.tar.gz
          printf '%s' "$GITHUB_SHA" > deploy.sha

      - name: Deploy stack over SSH
        env:
          OBSERVABILITY_HOST: ${{ secrets.OBSERVABILITY_HOST }}
          OBSERVABILITY_USER: ${{ secrets.OBSERVABILITY_USER }}
          OBSERVABILITY_SSH_KEY: ${{ secrets.OBSERVABILITY_SSH_KEY }}
          OBSERVABILITY_PORT: ${{ secrets.OBSERVABILITY_PORT }}
        run: |
          set -eu

          OBS_PORT="${OBSERVABILITY_PORT:-22}"

          : "${OBSERVABILITY_HOST:?OBSERVABILITY_HOST is required}"
          : "${OBSERVABILITY_USER:?OBSERVABILITY_USER is required}"
          : "${OBSERVABILITY_SSH_KEY:?OBSERVABILITY_SSH_KEY is required}"

          echo "[deploy] Preparing SSH client"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Accept raw PEM/OpenSSH keys, escaped \n secrets, quoted secrets, or base64-encoded key payloads.
          KEY_SECRET_TRIMMED=$(printf '%s' "$OBSERVABILITY_SSH_KEY" | perl -pe 's/^\s+//; s/\s+$//')
          case "$KEY_SECRET_TRIMMED" in
            \"*\") KEY_SECRET_TRIMMED=${KEY_SECRET_TRIMMED#\"}; KEY_SECRET_TRIMMED=${KEY_SECRET_TRIMMED%\"} ;;
            \'*\') KEY_SECRET_TRIMMED=${KEY_SECRET_TRIMMED#\'}; KEY_SECRET_TRIMMED=${KEY_SECRET_TRIMMED%\'} ;;
          esac
          KEY_SECRET_NORMALIZED=$(printf '%s' "$KEY_SECRET_TRIMMED" | perl -pe 's/\\r\\n/\n/g; s/\\n/\n/g; s/\r//g')

          if printf '%s' "$KEY_SECRET_NORMALIZED" | grep -q "BEGIN .* PRIVATE KEY"; then
            printf '%s' "$KEY_SECRET_NORMALIZED" > ~/.ssh/id_ed25519
          elif printf '%s' "$KEY_SECRET_TRIMMED" | tr -d '\r\n\t ' | base64 -d > ~/.ssh/id_ed25519 2>/dev/null; then
            :
          elif printf '%s' "$KEY_SECRET_TRIMMED" | tr -d '\r\n\t ' | tr '_-' '/+' | base64 -d > ~/.ssh/id_ed25519 2>/dev/null; then
            :
          else
            echo "[deploy] ERROR: OBSERVABILITY_SSH_KEY is neither a private key block nor valid base64."
            echo "[deploy] Save a raw private key (preferred) or a valid base64-encoded key without extra text."
            exit 1
          fi
          chmod 600 ~/.ssh/id_ed25519
          KEY_CHECK_ERR=$(mktemp)
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>"$KEY_CHECK_ERR"; then
            echo "[deploy] ERROR: OBSERVABILITY_SSH_KEY is not a valid private key after normalization."
            if grep -qi "passphrase" "$KEY_CHECK_ERR"; then
              echo "[deploy] The provided key appears to be passphrase-protected; CI requires an unencrypted deploy key."
            fi
            echo "[deploy] Store it as either:"
            echo "[deploy] 1) a raw multi-line OpenSSH/PEM key,"
            echo "[deploy] 2) the same key with escaped \\n sequences, or"
            echo "[deploy] 3) a base64-encoded private key."
            rm -f "$KEY_CHECK_ERR"
            exit 1
          fi
          rm -f "$KEY_CHECK_ERR"
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          mkdir -p ~/.ssh/controlmasters
          chmod 700 ~/.ssh/controlmasters

          SSH_OPTS="-i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts -o IdentitiesOnly=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o NumberOfPasswordPrompts=0 -o ControlMaster=auto -o ControlPersist=10m -o ControlPath=~/.ssh/controlmasters/%r@%h:%p"
          SSH_AF_OPT=""

          echo "[deploy] Skipping standalone SSH probe to reduce fail2ban risk"

          cat > deploy-remote.sh << 'REMOTE_SCRIPT'
          set -eu

          TARGET_PATH="$1"
          RELEASE_PATH="$TARGET_PATH/current"
          BACKUP_PATH="$TARGET_PATH/backups"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          INCOMING_PATH="$TARGET_PATH/incoming-$TIMESTAMP"
          BACKUP_FILE="$BACKUP_PATH/release-$TIMESTAMP.tar.gz"
          KUMA_VOLUME_NAME="bot-observability-kuma-data"
          KUMA_BACKUP_FILE="$BACKUP_PATH/kuma-data-$TIMESTAMP.tar.gz"
          RELEASE_BACKUP_RETENTION=5
          KUMA_BACKUP_RETENTION=5

          mkdir -p "$RELEASE_PATH"
          mkdir -p "$BACKUP_PATH"
          mkdir -p "$INCOMING_PATH"

          HAS_BACKUP=0
          if [ -n "$(ls -A "$RELEASE_PATH" 2>/dev/null || true)" ]; then
            tar -czf "$BACKUP_FILE" -C "$RELEASE_PATH" .
            HAS_BACKUP=1

            # Keep only the newest N release backups to avoid unbounded storage growth.
            echo "[deploy] Applying release backup retention: keep newest $RELEASE_BACKUP_RETENTION snapshots"
            old_release_backups=$(ls -1t "$BACKUP_PATH"/release-*.tar.gz 2>/dev/null | tail -n +$((RELEASE_BACKUP_RETENTION + 1)) || true)
            if [ -n "$old_release_backups" ]; then
              echo "$old_release_backups" | while IFS= read -r backup_file; do
                [ -n "$backup_file" ] || continue
                rm -f "$backup_file"
                echo "[deploy] Pruned old release backup: $backup_file"
              done
            fi
          fi

          if docker volume inspect "$KUMA_VOLUME_NAME" >/dev/null 2>&1; then
            echo "[deploy] Backing up Uptime Kuma data volume ($KUMA_VOLUME_NAME)"
            BACKUP_BASENAME="$(basename "$KUMA_BACKUP_FILE")"
            BACKUP_CMD="tar -czf /backup/$BACKUP_BASENAME -C /source ."
            BACKUP_ERR_FILE="$(mktemp)"

            if ! docker run --rm \
              -v "$KUMA_VOLUME_NAME:/source:ro" \
              -v "$BACKUP_PATH:/backup" \
              alpine:3.20 \
              sh -c "$BACKUP_CMD" 2>"$BACKUP_ERR_FILE"; then
              echo "[deploy] WARNING: Failed Kuma backup using alpine:3.20. Retrying with busybox:1.36"
              if ! docker run --rm \
                -v "$KUMA_VOLUME_NAME:/source:ro" \
                -v "$BACKUP_PATH:/backup" \
                busybox:1.36 \
                sh -c "$BACKUP_CMD" 2>>"$BACKUP_ERR_FILE"; then
                echo "[deploy] WARNING: Failed to create Kuma data backup snapshot"
                cat "$BACKUP_ERR_FILE" || true
              else
                echo "[deploy] Kuma backup snapshot created with busybox:1.36: $KUMA_BACKUP_FILE"
              fi
            else
              echo "[deploy] Kuma backup snapshot created: $KUMA_BACKUP_FILE"
            fi
            rm -f "$BACKUP_ERR_FILE"

            # Keep only the newest N Kuma backups to avoid unbounded storage growth.
            echo "[deploy] Applying Kuma backup retention: keep newest $KUMA_BACKUP_RETENTION snapshots"
            old_kuma_backups=$(ls -1t "$BACKUP_PATH"/kuma-data-*.tar.gz 2>/dev/null | tail -n +$((KUMA_BACKUP_RETENTION + 1)) || true)
            if [ -n "$old_kuma_backups" ]; then
              echo "$old_kuma_backups" | while IFS= read -r backup_file; do
                [ -n "$backup_file" ] || continue
                rm -f "$backup_file"
                echo "[deploy] Pruned old Kuma backup: $backup_file"
              done
            fi
          else
            echo "[deploy] Kuma data volume not found yet; skipping Kuma backup"
          fi

          rollback() {
            echo "Deployment failed. Attempting rollback..."
            if [ "$HAS_BACKUP" -eq 1 ]; then
              find "$RELEASE_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} \;
              tar -xzf "$BACKUP_FILE" -C "$RELEASE_PATH"
              cd "$RELEASE_PATH"
              docker compose up -d --remove-orphans || true
            fi
            rm -rf "$INCOMING_PATH"
            rm -f /tmp/observability.tar.gz /tmp/deploy.sha
            exit 1
          }
          trap rollback ERR

          tar -xzf /tmp/observability.tar.gz -C "$INCOMING_PATH"

          cat > "$INCOMING_PATH/.env" << 'ENVFILE'
          GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          HALO_LOG_PATH=${{ secrets.HALO_LOG_PATH }}
          PANDA_LOG_PATH=${{ secrets.PANDA_LOG_PATH }}
          KUMA_METRICS_API_KEY=${{ secrets.KUMA_METRICS_API_KEY }}
          ENVFILE

          mkdir -p "$INCOMING_PATH/secrets"
          printf '%s' "${{ secrets.KUMA_METRICS_API_KEY }}" > "$INCOMING_PATH/secrets/kuma_metrics_api_key"
          # Prometheus container runs as non-root; file must be world-readable on bind mount.
          chmod 644 "$INCOMING_PATH/secrets/kuma_metrics_api_key"

          find "$RELEASE_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} \;
          cp -a "$INCOMING_PATH"/. "$RELEASE_PATH"/
          if [ -f "$RELEASE_PATH/deploy/reset-observability-logs.sh" ]; then
            chmod 755 "$RELEASE_PATH/deploy/reset-observability-logs.sh"
          else
            echo "[deploy] ERROR: expected reset script missing at $RELEASE_PATH/deploy/reset-observability-logs.sh"
            exit 1
          fi

          if [ -f /tmp/deploy.sha ]; then
            cp /tmp/deploy.sha "$RELEASE_PATH/.deployed_sha"
            chmod 644 "$RELEASE_PATH/.deployed_sha"
            echo "[deploy] deployed sha: $(cat "$RELEASE_PATH/.deployed_sha")"
          fi
          rm -rf "$INCOMING_PATH"
          rm -f /tmp/observability.tar.gz /tmp/deploy.sha

          cd "$RELEASE_PATH"
          echo "[deploy] docker compose down"
          docker compose down
          echo "[deploy] docker compose pull"
          docker compose pull
          echo "[deploy] docker compose up"
          docker compose up -d --remove-orphans
          echo "[deploy] docker compose ps"
          docker compose ps
          trap - ERR
          docker image prune -f
          REMOTE_SCRIPT

          echo "[deploy] Uploading deployment artifacts"

          SCP_ERR_FILE=$(mktemp)
          if ! timeout 180s scp -P "$OBS_PORT" $SSH_OPTS \
            observability.tar.gz deploy-remote.sh deploy.sha \
            "$OBSERVABILITY_USER@$OBSERVABILITY_HOST:/tmp/" 2>"$SCP_ERR_FILE"; then
            if grep -qi "Network is unreachable" "$SCP_ERR_FILE"; then
              echo "[deploy] Network unreachable with default address family; retrying upload with IPv4"
              SSH_AF_OPT="-4"
              timeout 180s scp $SSH_AF_OPT -P "$OBS_PORT" $SSH_OPTS \
                observability.tar.gz deploy-remote.sh deploy.sha \
                "$OBSERVABILITY_USER@$OBSERVABILITY_HOST:/tmp/"
            else
              cat "$SCP_ERR_FILE"
              rm -f "$SCP_ERR_FILE"
              exit 1
            fi
          fi
          rm -f "$SCP_ERR_FILE"

          echo "[deploy] Executing remote deploy script"

          SSH_ERR_FILE=$(mktemp)
          if ! timeout 45m ssh $SSH_AF_OPT -p "$OBS_PORT" $SSH_OPTS \
            "$OBSERVABILITY_USER@$OBSERVABILITY_HOST" "bash /tmp/deploy-remote.sh '${{ secrets.OBSERVABILITY_TARGET_PATH }}'" 2>"$SSH_ERR_FILE"; then
            if [ -z "$SSH_AF_OPT" ] && grep -qi "Network is unreachable" "$SSH_ERR_FILE"; then
              echo "[deploy] Network unreachable during remote execution; retrying with IPv4"
              SSH_AF_OPT="-4"
              timeout 45m ssh $SSH_AF_OPT -p "$OBS_PORT" $SSH_OPTS \
                "$OBSERVABILITY_USER@$OBSERVABILITY_HOST" "bash /tmp/deploy-remote.sh '${{ secrets.OBSERVABILITY_TARGET_PATH }}'"
            else
              cat "$SSH_ERR_FILE"
              rm -f "$SSH_ERR_FILE"
              exit 1
            fi
          fi
          rm -f "$SSH_ERR_FILE"

          ssh $SSH_AF_OPT -p "$OBS_PORT" $SSH_OPTS -O exit "$OBSERVABILITY_USER@$OBSERVABILITY_HOST" >/dev/null 2>&1 || true
          rm -f deploy-remote.sh deploy.sha
